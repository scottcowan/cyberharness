[project]
name = "cyberharness"
version = "0.1.0"
description = "Connectivity-aware AI harness for the Jetson Cyberdeck"
requires-python = ">=3.11"
dependencies = [
    "textual>=8.2,<9",
    "rich>=15.0,<16",
    "typer>=0.26,<0.27",
    "httpx>=0.28,<0.29",
    "pydantic>=2.13,<3",
    "pydantic-settings>=2.14,<3",
    "pyyaml>=6.0,<7",
    "aiofiles>=25.1,<26",
    "watchfiles>=1.2,<2",
    "tenacity>=9.1,<10",
    "filelock>=3.29,<4",
]

[project.scripts]
cyberharness = "cyberharness.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cyberharness"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]
